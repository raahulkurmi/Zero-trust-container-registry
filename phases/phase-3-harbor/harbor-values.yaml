expose:
  type: ingress
  tls:
    enabled: true
    certSource: secret
    secret:
      secretName: harbor-tls-secret
  ingress:
    hosts:
      core: registry.ztcr.local
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

externalURL: https://registry.ztcr.local:8443

harborAdminPassword: "Harbor12345"

persistence:
  enabled: false

trivy:
  enabled: true
  replicas: 1

notary:
  enabled: false

database:
  type: internal

redis:
  type: internal
