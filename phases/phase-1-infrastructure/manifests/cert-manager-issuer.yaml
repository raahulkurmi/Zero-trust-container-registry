---
# Step 1 — Bootstrap issuer
# Self-signed, used only once to create the root CA below.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}

---
# Step 2 — ZTCR root CA certificate
# All service TLS certs (Harbor, Keycloak, Grafana) are signed by this CA.
# You only need to trust this one cert on your Mac and Docker client.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ztcr-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: ztcr-local-ca
  subject:
    organizations:
      - ZTCR Local Dev
  secretName: ztcr-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io

---
# Step 3 — CA-backed ClusterIssuer
# Every phase uses this issuer when requesting TLS certificates.
# Reference it in Certificate resources as:
#   issuerRef:
#     name: ztcr-ca-issuer
#     kind: ClusterIssuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: ztcr-ca-issuer
spec:
  ca:
    secretName: ztcr-ca-secret
