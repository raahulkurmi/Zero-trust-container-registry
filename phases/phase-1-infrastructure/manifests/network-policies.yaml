---
# ── Workload: team-alpha ───────────────────────────────────────────────────────

# Block all unsolicited inbound traffic to team-alpha pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: team-alpha
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow team-alpha pods to reach platform services (Harbor, Keycloak) over HTTPS
# and to resolve DNS (UDP/53).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-egress
  namespace: team-alpha
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              team: platform
      ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

---
# Allow inbound traffic from Kyverno (security-zone: system) so the
# admission webhook can evaluate pods in this namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kyverno-ingress
  namespace: team-alpha
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              security-zone: system

---
